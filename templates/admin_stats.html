<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master Stats | PEC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #F8FAFC; 
            min-height: 100vh; 
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .status-badge {
            font-size: 9px;
            font-weight: 800;
            padding: 5px 2px;
            border-radius: 8px;
            text-align: center;
            text-transform: uppercase;
            width: 100%;
            min-width: 50px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-width: 1px;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .Present { background: #10b981 !important; color: white !important; border-color: #059669 !important; }
        .Absent { background: #ef4444 !important; color: white !important; border-color: #dc2626 !important; }
        .OD { background: #3b82f6 !important; color: white !important; border-color: #2563eb !important; }
        .Pending { background: #F1F5F9 !important; color: #94A3B8 !important; border-color: #E2E8F0 !important; }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-12">

    <div id="statsModal" class="modal items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] max-w-lg w-full p-8 shadow-2xl overflow-hidden relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600 font-bold">✕</button>
            <h3 id="modalName" class="text-xl font-black text-slate-900 mb-1">Student Name</h3>
            <p id="modalRoll" class="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-6">Roll Number</p>
            <div id="modalBody" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2 no-scrollbar"></div>
        </div>
    </div>

    <header class="glass-header sticky top-0 z-50 px-6 py-4 mb-8 glass-panel shadow-sm">
        <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg">A</div>
                <div>
                    <h1 class="text-lg font-bold text-slate-900 leading-tight">Admin Console</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">PEC Attendance Analytics</p>
                </div>
            </div>

            <div class="flex flex-wrap gap-2 items-center">
                <input type="date" id="date-pick" onchange="loadReport()" class="bg-white border border-slate-200 px-3 py-2 rounded-xl text-xs font-bold outline-none">
                <select id="dept-select" onchange="updateBatches()" class="bg-white border border-slate-200 px-3 py-2 rounded-xl text-xs font-bold outline-none"></select>
                <select id="batch-select" onchange="updateSections()" class="bg-white border border-slate-200 px-3 py-2 rounded-xl text-xs font-bold outline-none"></select>
                <select id="sec-select" onchange="loadReport()" class="bg-white border border-slate-200 px-3 py-2 rounded-xl text-xs font-bold outline-none"></select>
                <a href="/logout" class="bg-rose-50 text-rose-600 px-4 py-2 rounded-xl text-xs font-black border border-rose-100">Logout</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Strength</p>
                <h2 id="count-total" class="text-2xl font-black text-slate-900">0</h2>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-[9px] font-black text-emerald-500 uppercase mb-1">Students Present</p>
                <h2 id="count-present" class="text-2xl font-black text-slate-900">0</h2>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-[9px] font-black text-rose-500 uppercase mb-1">Students Absent</p>
                <h2 id="count-absent" class="text-2xl font-black text-slate-900">0</h2>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-[9px] font-black text-blue-500 uppercase mb-1">OD Recipients</p>
                <h2 id="count-od" class="text-2xl font-black text-slate-900">0</h2>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead>
                        <tr id="table-header" class="bg-slate-50 border-b border-slate-100"></tr>
                    </thead>
                    <tbody id="report-body" class="divide-y divide-slate-50">
                        <tr><td colspan="11" class="p-20 text-center text-slate-400 font-bold text-xs italic">Select filters to load attendance data.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let dbStructure = {};
        document.getElementById('date-pick').valueAsDate = new Date();

        window.onload = async () => {
            const res = await fetch('/api/admin/get_structure');
            dbStructure = await res.json();
            const deptSelect = document.getElementById('dept-select');
            deptSelect.innerHTML = '<option value="">Select Dept</option>';
            Object.keys(dbStructure).forEach(d => {
                deptSelect.innerHTML += `<option value="${d}">${d}</option>`;
            });
            renderTableHeader();
        };

        function renderTableHeader(subjects = {}) {
            const header = document.getElementById('table-header');
            let html = `<th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Student Information</th>`;
            for (let i = 1; i <= 8; i++) {
                const subName = subjects['P'+i] || '---';
                html += `<th class="text-center p-4">
                    <div class="text-[9px] font-black text-indigo-600 uppercase mb-1">P${i}</div>
                    <div class="text-[8px] font-bold text-slate-400 uppercase truncate w-20 mx-auto" title="${subName}">${subName}</div>
                </th>`;
            }
            html += `<th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Action</th>`;
            header.innerHTML = html;
        }

        function updateBatches() {
            const dept = document.getElementById('dept-select').value;
            const batchSelect = document.getElementById('batch-select');
            batchSelect.innerHTML = '<option value="">Select Batch</option>';
            if(dept && dbStructure[dept]) {
                Object.keys(dbStructure[dept]).forEach(b => {
                    batchSelect.innerHTML += `<option value="${b}">${b}</option>`;
                });
            }
            updateSections();
        }

        function updateSections() {
            const dept = document.getElementById('dept-select').value;
            const batch = document.getElementById('batch-select').value;
            const secSelect = document.getElementById('sec-select');
            secSelect.innerHTML = '<option value="">Select Sec</option>';
            if(dept && batch && dbStructure[dept][batch]) {
                Object.keys(dbStructure[dept][batch]).forEach(key => {
                    secSelect.innerHTML += `<option value="${key}">${key}</option>`;
                });
            }
        }

        async function loadReport() {
            const dept = document.getElementById('dept-select').value;
            const batch = document.getElementById('batch-select').value;
            const sec = document.getElementById('sec-select').value;
            const date = document.getElementById('date-pick').value;

            if(!dept || !batch || !sec) return;

            const tbody = document.getElementById('report-body');
            tbody.innerHTML = '<tr><td colspan="11" class="p-20 text-center text-indigo-500 animate-pulse font-bold">Fetching Data...</td></tr>';

            try {
                const params = new URLSearchParams({ dept, batch, sec, date });
                const res = await fetch(`/api/admin/get_report?${params}`);
                const data = await res.json();
                
                let sP = 0, sA = 0, sO = 0;
                let foundSubjects = {};

                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="11" class="p-20 text-center text-slate-400 font-bold italic">No records found.</td></tr>';
                    resetStats(); renderTableHeader(); return;
                }

                data.forEach(s => {
                    for(let i=1; i<=8; i++) {
                        if(s.attendance && s.attendance['P'+i]?.subject) foundSubjects['P'+i] = s.attendance['P'+i].subject;
                    }
                });

                renderTableHeader(foundSubjects);

                tbody.innerHTML = data.map(s => {
                    let pRow = "";
                    let periodsAttended = 0;
                    let hasAbsence = false, hasOD = false;

                    for (let i = 1; i <= 8; i++) {
                        const p = s.attendance ? s.attendance['P' + i] : null; 
                        let label = "-", css = "Pending";

                        if (p && typeof p === 'object') {
                            const status = p.status;
                            if (status === 'P') { label = "P"; css = "Present"; periodsAttended++; }
                            else if (status === 'A') { label = "A"; css = "Absent"; hasAbsence = true; }
                            else if (status === 'OD') { label = "OD"; css = "OD"; periodsAttended++; hasOD = true; }
                        }
                        pRow += `<td class="px-2 py-4"><div class="status-badge ${css}">${label}</div></td>`;
                    }

                    if (hasAbsence) sA++; else sP++;
                    if (hasOD) sO++;

                    return `<tr class="hover:bg-slate-50 transition-all border-b border-slate-50/50">
                        <td class="p-6">
                            <div class="flex items-center gap-3">
                                <div>
                                    <div class="font-black text-slate-800 text-sm tracking-tight">${s.roll}</div>
                                    <div class="text-[9px] font-bold text-slate-400 uppercase">${s.name}</div>
                                </div>
                                <div class="ml-auto bg-slate-100 px-2 py-1 rounded-lg font-black text-[10px] text-slate-600">${periodsAttended}/8</div>
                            </div>
                        </td>
                        ${pRow}
                        <td class="p-6 text-center">
                            <button onclick="viewCumulative('${s.roll}', '${s.name}')" class="text-[10px] font-black text-indigo-600 hover:text-indigo-800 uppercase underline decoration-2 underline-offset-4">View Stats</button>
                        </td>
                    </tr>`;
                }).join('');

                document.getElementById('count-total').innerText = data.length;
                document.getElementById('count-present').innerText = sP;
                document.getElementById('count-absent').innerText = sA;
                document.getElementById('count-od').innerText = sO;

            } catch (err) { tbody.innerHTML = '<tr><td colspan="11" class="p-20 text-center text-red-500 font-bold">Error loading.</td></tr>'; }
        }

        async function viewCumulative(roll, name) {
            const modal = document.getElementById('statsModal');
            const modalBody = document.getElementById('modalBody');
            document.getElementById('modalName').innerText = name;
            document.getElementById('modalRoll').innerText = roll;
            modalBody.innerHTML = '<div class="text-center p-10 text-indigo-500 font-bold animate-pulse">Calculating Stats...</div>';
            modal.style.display = 'flex';

            try {
                const res = await fetch(`/api/admin/get_student_cumulative_stats?roll=${roll}`);
                const stats = await res.json();
                
                if (!stats || Object.keys(stats).length === 0) {
                    modalBody.innerHTML = '<p class="text-center p-10 text-slate-400 font-bold text-xs">No records found.</p>';
                    return;
                }
                
                modalBody.innerHTML = Object.entries(stats).map(([subject, data]) => {
                    // UPDATED LOGIC: Include OD in the attended count
                    // Assumes backend sends 'attended' as P + OD. 
                    // If backend only sends P, you would do: const totalAttended = data.present + data.od;
                    const totalAttended = data.attended || 0; 
                    const totalPeriods = data.total || 0;
                    
                    const percentage = totalPeriods > 0 ? Math.round((totalAttended / totalPeriods) * 100) : 0;
                    
                    // Static color classes to ensure Tailwind picks them up
                    let colorClass = "text-rose-600";
                    let bgClass = "bg-rose-500";
                    if (percentage >= 75) {
                        colorClass = "text-emerald-600";
                        bgClass = "bg-emerald-500";
                    } else if (percentage >= 50) {
                        colorClass = "text-amber-600";
                        bgClass = "bg-amber-500";
                    }
                    
                    return `<div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <div class="flex justify-between items-center mb-2">
                            <div class="max-w-[70%]">
                                <h4 class="text-[10px] font-black text-slate-700 uppercase truncate" title="${subject}">${subject}</h4>
                                <p class="text-[8px] font-bold text-slate-400 uppercase">Subject Performance</p>
                            </div>
                            <div class="text-right">
                                <span class="text-lg font-black ${colorClass}">${totalAttended} <span class="text-slate-300 text-sm">/ ${totalPeriods}</span></span>
                                <div class="text-[8px] font-black uppercase tracking-tighter opacity-70">Periods</div>
                            </div>
                        </div>
                        <div class="w-full bg-slate-200 h-1.5 mt-3 rounded-full overflow-hidden">
                            <div class="${bgClass} h-full transition-all duration-500" style="width: ${percentage}%"></div>
                        </div>
                        <div class="flex justify-between mt-1">
                             <span class="text-[8px] font-bold text-slate-400 uppercase">${percentage}% Attendance</span>
                             <span class="text-[8px] font-bold text-slate-400 uppercase">Incl. OD</span>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) { modalBody.innerHTML = '<p class="text-center text-red-500 font-bold text-xs">Error fetching statistics.</p>'; }
        }

        function closeModal() { document.getElementById('statsModal').style.display = 'none'; }
        function resetStats() {
            ['count-total', 'count-present', 'count-absent', 'count-od'].forEach(id => document.getElementById(id).innerText = "0");
        }
        window.onclick = function(e) { if (e.target == document.getElementById('statsModal')) closeModal(); }
    </script>
</body>
</html>
